<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects - Admin Portofolio</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/projects.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Admin Panel</h2>
      </div>

      <nav class="sidebar-nav">
        <ul>
          <li>
            <a href="dashboard.html">
              <i class="fas fa-home"></i> Dashboard
            </a>
          </li>

          <li>
            <a href="experience.html">
              <i class="fas fa-briefcase"></i> Experience
            </a>
          </li>

          <li>
            <a href="projects.html" class="active">
              <i class="fas fa-folder"></i> Projects
            </a>
          </li>

          <li>
            <a href="skills.html">
              <i class="fas fa-star"></i> Skills
            </a>
          </li>

          <li>
            <a href="akun.html">
              <i class="fas fa-user"></i> Akun
            </a>
          </li>

          <li>
            <a href="../../index.html">
              <i class="fas fa-sign-out-alt"></i> Logout
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <h1>Kelola Proyek</h1>

        <div class="user-info">
          <span>Halo, Admin</span>
        </div>
      </header>

      <div class="page-content">
        <!-- Form Section -->
        <div class="form-section">
          <h3>Tambah / Edit Proyek</h3>

          <form id="projectForm" class="data-form">
            <input type="hidden" id="projId" />

            <!-- Judul -->
            <div class="form-row">
              <div class="form-group full-width">
                <label for="projTitle">Judul Proyek</label>
                <input
                  type="text"
                  id="projTitle"
                  placeholder="Contoh: Sistem Manajemen Inventaris"
                  required
                />
              </div>
            </div>

            <!-- Deskripsi -->
            <div class="form-row">
              <div class="form-group full-width">
                <label for="projDescription">Deskripsi</label>
                <textarea
                  id="projDescription"
                  rows="4"
                  placeholder="Deskripsikan proyek Anda..."
                  required
                ></textarea>
              </div>
            </div>

            <!-- Tags -->
            <div class="form-row">
              <div class="form-group full-width">
                <label for="projTags">
                  Tags (pisahkan dengan koma)
                </label>

                <input
                  type="text"
                  id="projTags"
                  placeholder="Contoh: Python, Flask, SQLite"
                  required
                />
              </div>
            </div>

            <!-- Upload Gambar -->
            <div class="form-row">
              <div class="form-group full-width">
                <label for="projImage">Foto Proyek</label>

                <input
                  type="file"
                  id="projImage"
                  accept="image/*"
                />
              </div>
            </div>

            <!-- Preview -->
            <div class="form-row">
              <div class="form-group full-width">
                <img
                  id="imagePreview"
                  src=""
                  alt="Preview Gambar"
                  style="
                    display: none;
                    max-width: 300px;
                    max-height: 200px;
                    object-fit: cover;
                    border-radius: 8px;
                    border: 1px solid #ddd;
                    margin-top: 10px;
                  "
                />
              </div>
            </div>

            <!-- Actions -->
            <div class="form-actions">
              <button
                type="submit"
                class="btn btn-primary"
                id="saveBtn"
              >
                <i class="fas fa-save"></i>
                Simpan
              </button>

              <button
                type="button"
                class="btn btn-secondary"
                id="cancelBtn"
                style="display: none"
              >
                <i class="fas fa-times"></i>
                Batal
              </button>
            </div>
          </form>
        </div>

        <!-- Daftar Project -->
        <div class="table-section">
          <h3>Daftar Proyek</h3>

          <div
            id="projectList"
            class="data-grid"
          ></div>
        </div>
      </div>
    </main>

    <script src="js/init-data.js"></script>
    <script src="js/base.js"></script>
    <script src="js/projects.js"></script>
  </body>
</html>
