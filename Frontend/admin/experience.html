<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experience - Admin Portofolio</title>
    <!-- Font Awesome untuk ikon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/experience.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Admin Panel</h2>
      </div>
      <nav class="sidebar-nav">
        <ul>
          <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
          <li><a href="experience.html" class="active"><i class="fas fa-briefcase"></i> Experience</a></li>
          <li><a href="projects.html"><i class="fas fa-folder"></i> Projects</a></li>
          <li><a href="skills.html"><i class="fas fa-star"></i> Skills</a></li>
          <li><a href="akun.html"><i class="fas fa-user"></i> Akun</a></li>
          <li><a href="../../index.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <h1>Kelola Pengalaman</h1>
        <div class="user-info">
          <span>Halo, Admin</span>
        </div>
      </header>

      <div class="page-content">
        <div class="form-section">
          <h3>Tambah / Edit Pengalaman</h3>
          <form id="experienceForm" class="data-form">
            <input type="hidden" id="expId" />
            <div class="form-row">
              <div class="form-group">
                <label for="expPeriod">Periode</label>
                <input type="text" id="expPeriod" placeholder="Contoh: 2024 - Sekarang" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="expTitle">Jabatan / Posisi</label>
                <input type="text" id="expTitle" placeholder="Contoh: Backend Developer" required />
              </div>
              <div class="form-group">
                <label for="expCompany">Perusahaan / Organisasi</label>
                <input type="text" id="expCompany" placeholder="Contoh: PT. ABC" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group full-width">
                <label for="expDescription">Deskripsi</label>
                <textarea id="expDescription" rows="4" placeholder="Deskripsikan pengalaman Anda..." required></textarea>
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary" id="saveBtn">
                <i class="fas fa-save"></i> Simpan
              </button>
              <button type="button" class="btn btn-secondary" id="cancelBtn" style="display: none;">
                <i class="fas fa-times"></i> Batal
              </button>
            </div>
          </form>
        </div>

        <div class="table-section">
          <h3>Daftar Pengalaman</h3>
          <div id="experienceList" class="data-grid"></div>
        </div>
      </div>
    </main>

    <script src="js/init-data.js"></script>
    <script src="js/base.js"></script>
    <script src="js/experience.js"></script>
  </body>
</html>
